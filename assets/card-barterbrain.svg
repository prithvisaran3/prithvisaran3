<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 180" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&amp;display=swap');
      
      .card-bg {
        fill: #0B0B10;
        stroke: #1F2029;
        stroke-width: 1.5;
      }
      .title-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 800;
        font-size: 26px;
        fill: #F3F4F6;
      }
      .badge-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 1px;
        fill: #818CF8;
      }
      .desc-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 400;
        font-size: 14.5px;
        fill: #9CA3AF;
      }
      .pill-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 600;
        font-size: 11px;
        fill: #818CF8;
      }
      
      @media (prefers-color-scheme: light) {
        .card-bg {
          fill: #FFFFFF;
          stroke: #E5E7EB;
        }
        .title-text {
          fill: #1F2937;
        }
        .desc-text {
          fill: #4B5563;
        }
      }
      
      @keyframes pulseGlow {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes floatIcon {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      .pulse-badge {
        animation: pulseGlow 2.5s ease-in-out infinite;
      }
      .icon-float {
        transform-origin: 1040px 90px;
        animation: floatIcon 4s ease-in-out infinite;
      }
      
      @keyframes sparkRotate {
        0%, 100% { transform: scale(0.9) rotate(0deg); opacity: 0.8; }
        50% { transform: scale(1.1) rotate(15deg); opacity: 1; }
      }
      .spark-anim {
        transform-origin: 1030px 80px;
        animation: sparkRotate 3s ease-in-out infinite;
      }
    </style>
    
    <linearGradient id="badge-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0.05"/>
    </linearGradient>
    
    <linearGradient id="spark-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Card Base -->
  <rect x="1" y="1" width="1198" height="178" rx="16" class="card-bg"/>

  <!-- Left Side content -->
  <g transform="translate(40, 30)">
    <text x="0" y="24" class="title-text">BarterBrAIn</text>
    
    <!-- Status Badge -->
    <g transform="translate(150, 4)" class="pulse-badge">
      <rect width="200" height="24" rx="12" fill="url(#badge-grad)" stroke="#818CF8" stroke-opacity="0.3" stroke-width="1"/>
      <circle cx="14" cy="12" r="3.5" fill="#818CF8"/>
      <text x="26" y="15.5" class="badge-text">BEST SOCIAL GOOD HACK</text>
    </g>

    <!-- Description -->
    <text x="0" y="62" class="desc-text">A student bartering marketplace featuring Gemini-powered price prediction and an in-chat</text>
    <text x="0" y="82" class="desc-text">negotiation assistant. Developed at Technica 2025, winning the "Best Hack for Social Good" prize.</text>
    
    <!-- Tech Pills -->
    <g transform="translate(0, 105)">
      <!-- Pill 1 -->
      <g transform="translate(0, 0)">
        <rect width="65" height="22" rx="11" fill="#EEF2F6" fill-opacity="0.05" stroke="#818CF8" stroke-opacity="0.4"/>
        <text x="32.5" y="14.5" text-anchor="middle" class="pill-text" fill="#818CF8">Flutter</text>
      </g>
      <!-- Pill 2 -->
      <g transform="translate(75, 0)">
        <rect width="75" height="22" rx="11" fill="#EEF2F6" fill-opacity="0.05" stroke="#818CF8" stroke-opacity="0.4"/>
        <text x="37.5" y="14.5" text-anchor="middle" class="pill-text" fill="#818CF8">Firebase</text>
      </g>
      <!-- Pill 3 -->
      <g transform="translate(160, 0)">
        <rect width="90" height="22" rx="11" fill="#EEF2F6" fill-opacity="0.05" stroke="#818CF8" stroke-opacity="0.4"/>
        <text x="45" y="14.5" text-anchor="middle" class="pill-text" fill="#818CF8">Gemini API</text>
      </g>
      <!-- Pill 4 -->
      <g transform="translate(260, 0)">
        <rect width="105" height="22" rx="11" fill="#EEF2F6" fill-opacity="0.05" stroke="#818CF8" stroke-opacity="0.4"/>
        <text x="52.5" y="14.5" text-anchor="middle" class="pill-text" fill="#818CF8">Capital One API</text>
      </g>
    </g>
  </g>

  <!-- Right Side Vector Illustration: Scale & Gemini Spark -->
  <g class="icon-float" opacity="0.8">
    <!-- Balance Scale -->
    <path d="M 980 120 L 1080 120" stroke="#818CF8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 1030 120 L 1030 65" stroke="#818CF8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 1000 65 L 1060 65" stroke="#818CF8" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Hangers -->
    <path d="M 1000 65 L 980 90 L 1000 65 Z" fill="none" stroke="#818CF8" stroke-opacity="0.6" stroke-width="1.5"/>
    <path d="M 1060 65 L 1080 90 L 1060 65 Z" fill="none" stroke="#818CF8" stroke-opacity="0.6" stroke-width="1.5"/>
    
    <!-- Glowing Gemini Spark above the center -->
    <g class="spark-anim" transform="translate(1018, 35)">
      <!-- 4-point star -->
      <path d="M 12 0 C 12 6.6 6.6 12 0 12 C 6.6 12 12 17.4 12 24 C 12 17.4 17.4 12 24 12 C 17.4 12 12 6.6 12 0 Z" fill="url(#spark-grad)"/>
    </g>
  </g>
</svg>
