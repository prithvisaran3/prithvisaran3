<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 50" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
      .hdr-text {
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 3px;
        fill: #F3F4F6;
      }
      @media (prefers-color-scheme: light) {
        .hdr-text {
          fill: #1F2937;
        }
      }
      @keyframes pulseWidth {
        0%, 100% { width: 40px; }
        50% { width: 80px; }
      }
      .underline-anim {
        animation: pulseWidth 3s ease-in-out infinite;
      }
    </style>
    <linearGradient id="glow-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#FB7185"/>
    </linearGradient>
  </defs>
  <text x="0" y="30" class="hdr-text">PHILOSOPHY</text>
  <rect x="0" y="42" width="50" height="3" rx="1.5" fill="url(#glow-grad)" class="underline-anim"/>
</svg>
