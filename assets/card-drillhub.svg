<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 180" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&amp;display=swap');
      
      .card-bg {
        fill: #0B0B10;
        stroke: #1F2029;
        stroke-width: 1.5;
      }
      .title-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 800;
        font-size: 26px;
        fill: #F3F4F6;
      }
      .badge-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 1px;
        fill: #A855F7;
      }
      .desc-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 400;
        font-size: 14.5px;
        fill: #9CA3AF;
      }
      .pill-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 600;
        font-size: 11px;
        fill: #C084FC;
      }
      
      @media (prefers-color-scheme: light) {
        .card-bg {
          fill: #FFFFFF;
          stroke: #E5E7EB;
        }
        .title-text {
          fill: #1F2937;
        }
        .desc-text {
          fill: #4B5563;
        }
      }
      
      @keyframes pulseGlow {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes floatIcon {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      .pulse-badge {
        animation: pulseGlow 2.5s ease-in-out infinite;
      }
      .icon-float {
        transform-origin: 1040px 90px;
        animation: floatIcon 4s ease-in-out infinite;
      }
    </style>
    
    <linearGradient id="badge-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0.05"/>
    </linearGradient>
    
    <linearGradient id="pitch-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Card Base -->
  <rect x="1" y="1" width="1198" height="178" rx="16" class="card-bg"/>

  <!-- Left Side content -->
  <g transform="translate(40, 30)">
    <text x="0" y="24" class="title-text">Drillhub</text>
    
    <!-- Status Badge -->
    <g transform="translate(130, 4)" class="pulse-badge">
      <rect width="180" height="24" rx="12" fill="url(#badge-grad)" stroke="#A855F7" stroke-opacity="0.3" stroke-width="1"/>
      <circle cx="14" cy="12" r="3.5" fill="#A855F7"/>
      <text x="26" y="15.5" class="badge-text">LIVE ON APP STORE</text>
    </g>

    <!-- Description -->
    <text x="0" y="62" class="desc-text">A soccer-academy management platform for coaches and players: event scheduling, drill libraries with</text>
    <text x="0" y="82" class="desc-text">video support, Stripe payment checkouts, and attendance tracking across complex multi-org structures.</text>
    
    <!-- Tech Pills -->
    <g transform="translate(0, 105)">
      <!-- Pill 1 -->
      <g transform="translate(0, 0)">
        <rect width="65" height="22" rx="11" fill="#F3E8FF" fill-opacity="0.05" stroke="#C084FC" stroke-opacity="0.4"/>
        <text x="32.5" y="14.5" text-anchor="middle" class="pill-text" fill="#C084FC">Flutter</text>
      </g>
      <!-- Pill 2 -->
      <g transform="translate(75, 0)">
        <rect width="75" height="22" rx="11" fill="#F3E8FF" fill-opacity="0.05" stroke="#C084FC" stroke-opacity="0.4"/>
        <text x="37.5" y="14.5" text-anchor="middle" class="pill-text" fill="#C084FC">Riverpod</text>
      </g>
      <!-- Pill 3 -->
      <g transform="translate(160, 0)">
        <rect width="75" height="22" rx="11" fill="#F3E8FF" fill-opacity="0.05" stroke="#C084FC" stroke-opacity="0.4"/>
        <text x="37.5" y="14.5" text-anchor="middle" class="pill-text" fill="#C084FC">Firebase</text>
      </g>
      <!-- Pill 4 -->
      <g transform="translate(245, 0)">
        <rect width="60" height="22" rx="11" fill="#F3E8FF" fill-opacity="0.05" stroke="#C084FC" stroke-opacity="0.4"/>
        <text x="30" y="14.5" text-anchor="middle" class="pill-text" fill="#C084FC">Stripe</text>
      </g>
    </g>
  </g>

  <!-- Right Side Vector Illustration: Soccer Pitch & Tactics -->
  <g class="icon-float" opacity="0.8">
    <!-- Pitch Rect -->
    <rect x="990" y="45" width="100" height="85" rx="8" fill="url(#pitch-grad)" stroke="#10B981" stroke-opacity="0.4" stroke-width="1.5"/>
    <!-- Pitch Markings -->
    <line x1="1040" y1="45" x2="1040" y2="130" stroke="#10B981" stroke-opacity="0.3" stroke-width="1.5"/>
    <circle cx="1040" cy="87.5" r="15" fill="none" stroke="#10B981" stroke-opacity="0.3" stroke-width="1.5"/>
    
    <!-- Tactic paths (Xs and Os) -->
    <circle cx="1015" cy="70" r="3" fill="#ffffff" stroke="none"/>
    <circle cx="1065" cy="105" r="3" fill="#ffffff" stroke="none"/>
    
    <g stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
      <!-- Player X -->
      <path d="M 1030 110 L 1036 116 M 1036 110 L 1030 116"/>
      <!-- Run Arrow -->
      <path d="M 1033 113 Q 1050 90 1060 100" fill="none" stroke-dasharray="3 3"/>
      <path d="M 1056 101 L 1060 100 L 1058 96" fill="none"/>
    </g>
  </g>
</svg>
