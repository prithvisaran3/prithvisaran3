<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 22" role="presentation">
  <defs>
    <linearGradient id="base" x1="0" x2="1">
      <stop offset="0" stop-color="#8B8BA7" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#8B8BA7" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8B8BA7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="streak" x1="0" x2="1">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22D3EE" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="10" width="1200" height="1.4" fill="url(#base)"/>
  <rect y="10" width="240" height="1.4" fill="url(#streak)">
    <animate attributeName="x" values="-240;1200" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
