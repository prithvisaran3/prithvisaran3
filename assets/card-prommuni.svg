<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 180" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&amp;display=swap');
      
      .card-bg {
        fill: #0B0B10;
        stroke: #1F2029;
        stroke-width: 1.5;
      }
      .title-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 800;
        font-size: 26px;
        fill: #F3F4F6;
      }
      .badge-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 1px;
        fill: #22D3EE;
      }
      .desc-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 400;
        font-size: 14.5px;
        fill: #9CA3AF;
      }
      .pill-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 600;
        font-size: 11px;
        fill: #60A5FA;
      }
      
      @media (prefers-color-scheme: light) {
        .card-bg {
          fill: #FFFFFF;
          stroke: #E5E7EB;
        }
        .title-text {
          fill: #1F2937;
        }
        .desc-text {
          fill: #4B5563;
        }
      }
      
      @keyframes pulseGlow {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes floatIcon {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      .pulse-badge {
        animation: pulseGlow 2.5s ease-in-out infinite;
      }
      .icon-float {
        transform-origin: 1040px 90px;
        animation: floatIcon 4s ease-in-out infinite;
      }
    </style>
    
    <linearGradient id="badge-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.05"/>
    </linearGradient>
    
    <linearGradient id="bubble-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Card Base -->
  <rect x="1" y="1" width="1198" height="178" rx="16" class="card-bg"/>

  <!-- Left Side content -->
  <!-- Title & Status Badge -->
  <g transform="translate(40, 30)">
    <text x="0" y="24" class="title-text">Prommuni</text>
    
    <!-- Status Badge -->
    <g transform="translate(160, 4)" class="pulse-badge">
      <rect width="210" height="24" rx="12" fill="url(#badge-grad)" stroke="#06B6D4" stroke-opacity="0.3" stroke-width="1"/>
      <circle cx="14" cy="12" r="3.5" fill="#22D3EE"/>
      <text x="26" y="15.5" class="badge-text">LIVE ON APP STORE &amp; PLAY</text>
    </g>

    <!-- Description -->
    <text x="0" y="62" class="desc-text">A roommate-finder application featuring real-time chat, geolocation matching, and a fluid liquid-glass UI.</text>
    <text x="0" y="82" class="desc-text">Designed, engineered, and shipped natively to both stores, gathering active organic users.</text>
    
    <!-- Tech Pills -->
    <g transform="translate(0, 105)">
      <!-- Pill 1 -->
      <g transform="translate(0, 0)">
        <rect width="65" height="22" rx="11" fill="#1E3A8A" fill-opacity="0.15" stroke="#3B82F6" stroke-opacity="0.4"/>
        <text x="32.5" y="14.5" text-anchor="middle" class="pill-text" fill="#60A5FA">Flutter</text>
      </g>
      <!-- Pill 2 -->
      <g transform="translate(75, 0)">
        <rect width="55" height="22" rx="11" fill="#1E3A8A" fill-opacity="0.15" stroke="#3B82F6" stroke-opacity="0.4"/>
        <text x="27.5" y="14.5" text-anchor="middle" class="pill-text" fill="#60A5FA">GetX</text>
      </g>
      <!-- Pill 3 -->
      <g transform="translate(140, 0)">
        <rect width="78" height="22" rx="11" fill="#1E3A8A" fill-opacity="0.15" stroke="#3B82F6" stroke-opacity="0.4"/>
        <text x="39" y="14.5" text-anchor="middle" class="pill-text" fill="#60A5FA">Supabase</text>
      </g>
      <!-- Pill 4 -->
      <g transform="translate(228, 0)">
        <rect width="70" height="22" rx="11" fill="#1E3A8A" fill-opacity="0.15" stroke="#3B82F6" stroke-opacity="0.4"/>
        <text x="35" y="14.5" text-anchor="middle" class="pill-text" fill="#60A5FA">Mapbox</text>
      </g>
    </g>
  </g>

  <!-- Right Side Vector Illustration -->
  <g class="icon-float" opacity="0.85">
    <!-- Overlapping Glass Chat Bubbles -->
    <circle cx="1020" cy="85" r="38" fill="url(#bubble-grad)" stroke="#22D3EE" stroke-opacity="0.3" stroke-width="1.5"/>
    <circle cx="1060" cy="105" r="28" fill="url(#bubble-grad)" stroke="#6366F1" stroke-opacity="0.3" stroke-width="1.5"/>
    
    <!-- Speech notches -->
    <path d="M 995 105 L 985 115 L 1000 112 Z" fill="#22D3EE" opacity="0.5"/>
    <path d="M 1078 122 L 1088 132 L 1082 120 Z" fill="#6366F1" opacity="0.5"/>
    
    <!-- Geolocation map pin inside main bubble -->
    <g transform="translate(1010, 68)" stroke="#FF3366" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
      <circle cx="12" cy="9" r="3" fill="#FF3366"/>
    </g>
  </g>
</svg>
