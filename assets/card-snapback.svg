<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 180" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&amp;display=swap');
      
      .card-bg {
        fill: #0B0B10;
        stroke: #1F2029;
        stroke-width: 1.5;
      }
      .title-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 800;
        font-size: 26px;
        fill: #F3F4F6;
      }
      .badge-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 1px;
        fill: #10B981;
      }
      .desc-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 400;
        font-size: 14.5px;
        fill: #9CA3AF;
      }
      .pill-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 600;
        font-size: 11px;
        fill: #34D399;
      }
      
      @media (prefers-color-scheme: light) {
        .card-bg {
          fill: #FFFFFF;
          stroke: #E5E7EB;
        }
        .title-text {
          fill: #1F2937;
        }
        .desc-text {
          fill: #4B5563;
        }
      }
      
      @keyframes pulseGlow {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes floatIcon {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      .pulse-badge {
        animation: pulseGlow 2.5s ease-in-out infinite;
      }
      .icon-float {
        transform-origin: 1040px 90px;
        animation: floatIcon 4s ease-in-out infinite;
      }
      
      @keyframes coinFloat {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-6px) rotate(15deg); }
      }
      .coin-anim {
        transform-origin: 1030px 80px;
        animation: coinFloat 3s ease-in-out infinite;
      }
    </style>
    
    <linearGradient id="badge-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0.05"/>
    </linearGradient>
    
    <linearGradient id="coin-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Card Base -->
  <rect x="1" y="1" width="1198" height="178" rx="16" class="card-bg"/>

  <!-- Left Side content -->
  <g transform="translate(40, 30)">
    <text x="0" y="24" class="title-text">SNAPback</text>
    
    <!-- Status Badge -->
    <g transform="translate(140, 4)" class="pulse-badge">
      <rect width="250" height="24" rx="12" fill="url(#badge-grad)" stroke="#10B981" stroke-opacity="0.3" stroke-width="1"/>
      <circle cx="14" cy="12" r="3.5" fill="#10B981"/>
      <text x="26" y="15.5" class="badge-text">1st PLACE &amp; OPEN SOURCE PRIZE</text>
    </g>

    <!-- Description -->
    <text x="0" y="62" class="desc-text">AI-driven cashback platform for 42M SNAP/WIC families that rewards *sustained* healthy grocery</text>
    <text x="0" y="82" class="desc-text">habits. Developed at George Hacks 2026, winning the grand championship and open source prize.</text>
    
    <!-- Tech Pills -->
    <g transform="translate(0, 105)">
      <!-- Pill 1 -->
      <g transform="translate(0, 0)">
        <rect width="65" height="22" rx="11" fill="#D1FAE5" fill-opacity="0.05" stroke="#34D399" stroke-opacity="0.4"/>
        <text x="32.5" y="14.5" text-anchor="middle" class="pill-text" fill="#34D399">Flutter</text>
      </g>
      <!-- Pill 2 -->
      <g transform="translate(75, 0)">
        <rect width="75" height="22" rx="11" fill="#D1FAE5" fill-opacity="0.05" stroke="#34D399" stroke-opacity="0.4"/>
        <text x="37.5" y="14.5" text-anchor="middle" class="pill-text" fill="#34D399">Firebase</text>
      </g>
      <!-- Pill 3 -->
      <g transform="translate(160, 0)">
        <rect width="70" height="22" rx="11" fill="#D1FAE5" fill-opacity="0.05" stroke="#34D399" stroke-opacity="0.4"/>
        <text x="35" y="14.5" text-anchor="middle" class="pill-text" fill="#34D399">Node.js</text>
      </g>
    </g>
  </g>

  <!-- Right Side Vector Illustration: Shopping Cart & Cash Coin -->
  <g class="icon-float" opacity="0.8">
    <!-- Shopping Cart Outline -->
    <path d="M 975 95 L 990 95 L 1005 60 L 1055 60 L 1065 85 L 998 85" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Wheels -->
    <circle cx="1006" cy="104" r="5" stroke="#10B981" stroke-width="2" fill="none"/>
    <circle cx="1054" cy="104" r="5" stroke="#10B981" stroke-width="2" fill="none"/>
    
    <!-- Floating Cashback Coin -->
    <g class="coin-anim">
      <circle cx="1035" cy="72" r="16" fill="url(#coin-grad)" stroke="#ffffff" stroke-width="1.5" filter="drop-shadow(0 2px 5px rgba(16,185,129,0.4))"/>
      <text x="1035" y="77" text-anchor="middle" font-family="'Outfit', sans-serif" font-weight="800" font-size="15" fill="#ffffff">$</text>
    </g>
  </g>
</svg>
