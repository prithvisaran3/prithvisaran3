<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" role="presentation">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&amp;display=swap');
      
      .stat-num {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 800;
        font-size: 38px;
        letter-spacing: -1px;
      }
      .stat-label {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 500;
        font-size: 14px;
        letter-spacing: 0.2px;
      }
      
      @keyframes sweep {
        0% { transform: translateY(-120px); }
        100% { transform: translateY(120px); }
      }
      @keyframes floatIcon {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      @keyframes pulseBorder {
        0%, 100% { stroke-opacity: 0.15; }
        50% { stroke-opacity: 0.4; }
      }
      
      .card-border {
        animation: pulseBorder 4s ease-in-out infinite;
      }
      .icon-float {
        animation: floatIcon 4s ease-in-out infinite;
      }
    </style>

    <linearGradient id="num-grad-1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="num-grad-2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="num-grad-3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#FB7185"/>
    </linearGradient>
    <linearGradient id="num-grad-4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    
    <clipPath id="card-clip"><rect width="275" height="100" rx="12"/></clipPath>
  </defs>

  <!-- CARD 1: 12+ Shipped Apps -->
  <g transform="translate(20, 10)">
    <!-- Base -->
    <rect width="275" height="100" rx="12" fill="#0A0A0F" fill-opacity="0.7"/>
    <rect width="275" height="100" rx="12" fill="none" stroke="#22D3EE" stroke-width="1.5" class="card-border"/>
    
    <!-- Icon (Mobile Device) -->
    <g transform="translate(24, 25)" class="icon-float" stroke="#22D3EE" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="2" width="14" height="26" rx="3"/>
      <line x1="12" y1="24" x2="12.01" y2="24"/>
      <!-- Waves -->
      <path d="M 23 9 A 12 12 0 0 1 23 21" stroke-width="1.5" opacity="0.6"/>
      <path d="M 27 6 A 17 17 0 0 1 27 24" stroke-width="1" opacity="0.3"/>
    </g>

    <!-- Texts -->
    <text x="75" y="48" class="stat-num" fill="url(#num-grad-1)">12+</text>
    <text x="75" y="70" class="stat-label" fill="#9CA3AF">Production Apps Shipped</text>
  </g>

  <!-- CARD 2: 10K+ Users -->
  <g transform="translate(315, 10)">
    <!-- Base -->
    <rect width="275" height="100" rx="12" fill="#0A0A0F" fill-opacity="0.7"/>
    <rect width="275" height="100" rx="12" fill="none" stroke="#C084FC" stroke-width="1.5" class="card-border" style="animation-delay: 1s;"/>
    
    <!-- Icon (Users Network) -->
    <g transform="translate(24, 25)" class="icon-float" style="animation-delay: 0.5s;" stroke="#C084FC" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </g>

    <!-- Texts -->
    <text x="75" y="48" class="stat-num" fill="url(#num-grad-2)">10K+</text>
    <text x="75" y="70" class="stat-label" fill="#9CA3AF">Active Users Reached</text>
  </g>

  <!-- CARD 3: 2 Live on Stores -->
  <g transform="translate(610, 10)">
    <!-- Base -->
    <rect width="275" height="100" rx="12" fill="#0A0A0F" fill-opacity="0.7"/>
    <rect width="275" height="100" rx="12" fill="none" stroke="#FB7185" stroke-width="1.5" class="card-border" style="animation-delay: 2s;"/>
    
    <!-- Icon (Rocket Ship) -->
    <g transform="translate(24, 25)" class="icon-float" style="animation-delay: 1s;" stroke="#FB7185" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M25 2l-11 11"/>
      <path d="M16.5 6.5l-4 4L7 9.5l-5 5 4.5 4.5L1 23l4.5-5.5 4.5 4.5 5-5-1-5.5 4-4"/>
      <path d="M8 16l2-2"/>
    </g>

    <!-- Texts -->
    <text x="75" y="48" class="stat-num" fill="url(#num-grad-3)">2</text>
    <text x="75" y="70" class="stat-label" fill="#9CA3AF">Apps Live on Apple &amp; Play</text>
  </g>

  <!-- CARD 4: 2x Hackathon Winner -->
  <g transform="translate(905, 10)">
    <!-- Base -->
    <rect width="275" height="100" rx="12" fill="#0A0A0F" fill-opacity="0.7"/>
    <rect width="275" height="100" rx="12" fill="none" stroke="#34D399" stroke-width="1.5" class="card-border" style="animation-delay: 3s;"/>
    
    <!-- Icon (Trophy) -->
    <g transform="translate(24, 25)" class="icon-float" style="animation-delay: 1.5s;" stroke="#34D399" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
      <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
      <path d="M4 22h16"/>
      <path d="M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34"/>
      <path d="M12 2a6 6 0 0 0-6 6v3.5a6 6 0 0 0 12 0V8a6 6 0 0 0-6-6z"/>
    </g>

    <!-- Texts -->
    <text x="75" y="48" class="stat-num" fill="url(#num-grad-4)">2×</text>
    <text x="75" y="70" class="stat-label" fill="#9CA3AF">Hackathon Winner</text>
  </g>
</svg>
