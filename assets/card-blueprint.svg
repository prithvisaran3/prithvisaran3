<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 180" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&amp;display=swap');
      
      .card-bg {
        fill: #0B0B10;
        stroke: #1F2029;
        stroke-width: 1.5;
      }
      .title-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 800;
        font-size: 26px;
        fill: #F3F4F6;
      }
      .badge-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 1px;
        fill: #EC4899;
      }
      .desc-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 400;
        font-size: 14.5px;
        fill: #9CA3AF;
      }
      .pill-text {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 600;
        font-size: 11px;
        fill: #F472B6;
      }
      
      @media (prefers-color-scheme: light) {
        .card-bg {
          fill: #FFFFFF;
          stroke: #E5E7EB;
        }
        .title-text {
          fill: #1F2937;
        }
        .desc-text {
          fill: #4B5563;
        }
      }
      
      @keyframes pulseGlow {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes floatIcon {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      .pulse-badge {
        animation: pulseGlow 2.5s ease-in-out infinite;
      }
      .icon-float {
        transform-origin: 1040px 90px;
        animation: floatIcon 4s ease-in-out infinite;
      }
      
      @keyframes flowData {
        to { stroke-dashoffset: -20; }
      }
      .flow-line {
        stroke-dasharray: 4 6;
        animation: flowData 1.5s linear infinite;
      }
    </style>
    
    <linearGradient id="badge-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0.05"/>
    </linearGradient>
    
    <linearGradient id="node-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Card Base -->
  <rect x="1" y="1" width="1198" height="178" rx="16" class="card-bg"/>

  <!-- Left Side content -->
  <g transform="translate(40, 30)">
    <text x="0" y="24" class="title-text">Blueprint AI</text>
    
    <!-- Status Badge -->
    <g transform="translate(160, 4)" class="pulse-badge">
      <rect width="210" height="24" rx="12" fill="url(#badge-grad)" stroke="#EC4899" stroke-opacity="0.3" stroke-width="1"/>
      <circle cx="14" cy="12" r="3.5" fill="#EC4899"/>
      <text x="26" y="15.5" class="badge-text">PRODUCTION DEPLOYMENT</text>
    </g>

    <!-- Description -->
    <text x="0" y="62" class="desc-text">An AI product that turns ideas into functional specs. Seven sequential AI agents collaborate on a</text>
    <text x="0" y="82" class="desc-text">single typed state model, streaming live markdown development to the UI via Server-Sent Events (SSE).</text>
    
    <!-- Tech Pills -->
    <g transform="translate(0, 105)">
      <!-- Pill 1 -->
      <g transform="translate(0, 0)">
        <rect width="80" height="22" rx="11" fill="#FCE7F3" fill-opacity="0.05" stroke="#F472B6" stroke-opacity="0.4"/>
        <text x="40" y="14.5" text-anchor="middle" class="pill-text" fill="#F472B6">React 19</text>
      </g>
      <!-- Pill 2 -->
      <g transform="translate(90, 0)">
        <rect width="85" height="22" rx="11" fill="#FCE7F3" fill-opacity="0.05" stroke="#F472B6" stroke-opacity="0.4"/>
        <text x="42.5" y="14.5" text-anchor="middle" class="pill-text" fill="#F472B6">TypeScript</text>
      </g>
      <!-- Pill 3 -->
      <g transform="translate(185, 0)">
        <rect width="68" height="22" rx="11" fill="#FCE7F3" fill-opacity="0.05" stroke="#F472B6" stroke-opacity="0.4"/>
        <text x="34" y="14.5" text-anchor="middle" class="pill-text" fill="#F472B6">FastAPI</text>
      </g>
      <!-- Pill 4 -->
      <g transform="translate(263, 0)">
        <rect width="85" height="22" rx="11" fill="#FCE7F3" fill-opacity="0.05" stroke="#F472B6" stroke-opacity="0.4"/>
        <text x="42.5" y="14.5" text-anchor="middle" class="pill-text" fill="#F472B6">LangGraph</text>
      </g>
    </g>
  </g>

  <!-- Right Side Vector Illustration: Agentic graph -->
  <g class="icon-float" opacity="0.8">
    <!-- Connecting flow paths -->
    <path d="M 980 90 Q 1030 50 1080 90 Q 1030 130 980 90" fill="none" stroke="#EC4899" stroke-opacity="0.3" stroke-width="1.5"/>
    <path d="M 980 90 Q 1030 50 1080 90" fill="none" stroke="#3B82F6" stroke-opacity="0.7" stroke-width="1.5" class="flow-line"/>
    <line x1="980" y1="90" x2="1080" y2="90" stroke="#EC4899" stroke-opacity="0.2" stroke-width="1.5"/>
    
    <!-- Central Node -->
    <circle cx="1030" cy="90" r="16" fill="url(#node-grad)" stroke="#EC4899" stroke-opacity="0.5" stroke-width="1.5"/>
    <circle cx="1030" cy="90" r="4" fill="#3B82F6"/>
    
    <!-- Outer Orbiting Nodes -->
    <circle cx="980" cy="90" r="7" fill="#EC4899"/>
    <circle cx="980" cy="90" r="2.5" fill="#ffffff"/>
    
    <circle cx="1080" cy="90" r="7" fill="#3B82F6"/>
    <circle cx="1080" cy="90" r="2.5" fill="#ffffff"/>
    
    <circle cx="1030" cy="55" r="5" fill="#818CF8"/>
    <circle cx="1030" cy="125" r="5" fill="#818CF8"/>
  </g>
</svg>
