<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" role="presentation">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&amp;display=swap');
      
      .stack-title {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 800;
        font-size: 13px;
        letter-spacing: 1.5px;
      }
      .pill-text {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 500;
        font-size: 12px;
      }
      
      @keyframes borderPulse {
        0%, 100% { stroke-opacity: 0.25; }
        50% { stroke-opacity: 0.65; }
      }
      @keyframes neonGlow {
        0%, 100% { filter: drop-shadow(0 0 1px rgba(79, 70, 229, 0.15)); }
        50% { filter: drop-shadow(0 0 3px rgba(79, 70, 229, 0.35)); }
      }

      .card-border {
        animation: borderPulse 4s ease-in-out infinite;
      }
      .glow-pill {
        animation: neonGlow 3s ease-in-out infinite;
      }
    </style>

    <!-- Colors and Gradients -->
    <linearGradient id="header-accent-1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="header-accent-2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
    <linearGradient id="header-accent-3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E11D48"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="header-accent-4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <!-- Pill Glow Effects -->
    <filter id="pill-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.05"/>
    </filter>
  </defs>

  <!-- CARD 1: Mobile (X = 20) -->
  <g transform="translate(20, 10)">
    <rect width="275" height="140" rx="12" fill="#FFFFFF" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.01))"/>
    <rect width="275" height="140" rx="12" fill="none" stroke="#2563EB" stroke-width="1.2" class="card-border"/>
    
    <!-- Title Section -->
    <rect x="15" y="15" width="4" height="16" rx="2" fill="url(#header-accent-1)"/>
    <text x="26" y="28" class="stack-title" fill="#374151">MOBILE DEVELOPMENT</text>
    
    <!-- Pills -->
    <!-- Row 1 -->
    <g transform="translate(15, 48)">
      <rect width="70" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="35" y="16" text-anchor="middle" class="pill-text" fill="#1D4ED8">Flutter</text>
    </g>
    <g transform="translate(95, 48)">
      <rect width="50" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="25" y="16" text-anchor="middle" class="pill-text" fill="#2563EB">Dart</text>
    </g>
    <g transform="translate(155, 48)">
      <rect width="55" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="27.5" y="16" text-anchor="middle" class="pill-text" fill="#DC2626">Swift</text>
    </g>
    <g transform="translate(217, 48)">
      <rect width="43" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="21.5" y="16" text-anchor="middle" class="pill-text" fill="#4B5563">iOS</text>
    </g>
    
    <!-- Row 2 -->
    <g transform="translate(15, 82)">
      <rect width="75" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="37.5" y="16" text-anchor="middle" class="pill-text" fill="#EF4444">SwiftUI</text>
    </g>
    <g transform="translate(100, 82)">
      <rect width="65" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="32.5" y="16" text-anchor="middle" class="pill-text" fill="#7C3AED">Kotlin</text>
    </g>
    <g transform="translate(175, 82)">
      <rect width="85" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="42.5" y="16" text-anchor="middle" class="pill-text" fill="#4B5563">App Stores</text>
    </g>
  </g>

  <!-- CARD 2: AI / ML (X = 315) -->
  <g transform="translate(315, 10)">
    <rect width="275" height="140" rx="12" fill="#FFFFFF" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.01))"/>
    <rect width="275" height="140" rx="12" fill="none" stroke="#4F46E5" stroke-width="1.2" class="card-border" style="animation-delay: 1s;"/>
    
    <!-- Title Section -->
    <rect x="15" y="15" width="4" height="16" rx="2" fill="url(#header-accent-2)"/>
    <text x="26" y="28" class="stack-title" fill="#374151">AI &amp; MACHINE LEARNING</text>
    
    <!-- Pills -->
    <!-- Row 1 -->
    <g transform="translate(15, 48)">
      <rect width="85" height="24" rx="12" fill="#F5F3FF" stroke="#4F46E5" stroke-width="1" class="glow-pill" filter="url(#pill-shadow)"/>
      <text x="42.5" y="16" text-anchor="middle" class="pill-text" fill="#4F46E5" font-weight="700">LangGraph</text>
    </g>
    <g transform="translate(110, 48)">
      <rect width="70" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="35" y="16" text-anchor="middle" class="pill-text" fill="#6D28D9">Gemini</text>
    </g>
    <g transform="translate(190, 48)">
      <rect width="70" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="35" y="16" text-anchor="middle" class="pill-text" fill="#DC2626">PyTorch</text>
    </g>
    
    <!-- Row 2 -->
    <g transform="translate(15, 82)">
      <rect width="75" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="37.5" y="16" text-anchor="middle" class="pill-text" fill="#1D4ED8">Core ML</text>
    </g>
    <g transform="translate(100, 82)">
      <rect width="160" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="80" y="16" text-anchor="middle" class="pill-text" fill="#4B5563">Agentic Architectures</text>
    </g>
  </g>

  <!-- CARD 3: Backend & Cloud (X = 610) -->
  <g transform="translate(610, 10)">
    <rect width="275" height="140" rx="12" fill="#FFFFFF" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.01))"/>
    <rect width="275" height="140" rx="12" fill="none" stroke="#E11D48" stroke-width="1.2" class="card-border" style="animation-delay: 2s;"/>
    
    <!-- Title Section -->
    <rect x="15" y="15" width="4" height="16" rx="2" fill="url(#header-accent-3)"/>
    <text x="26" y="28" class="stack-title" fill="#374151">BACKEND &amp; CLOUD</text>
    
    <!-- Pills -->
    <!-- Row 1 -->
    <g transform="translate(15, 48)">
      <rect width="65" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="32.5" y="16" text-anchor="middle" class="pill-text" fill="#D97706">Python</text>
    </g>
    <g transform="translate(90, 48)">
      <rect width="70" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="35" y="16" text-anchor="middle" class="pill-text" fill="#059669">FastAPI</text>
    </g>
    <g transform="translate(170, 48)">
      <rect width="90" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="45" y="16" text-anchor="middle" class="pill-text" fill="#4B5563">Supabase</text>
    </g>
    
    <!-- Row 2 -->
    <g transform="translate(15, 82)">
      <rect width="75" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="37.5" y="16" text-anchor="middle" class="pill-text" fill="#DC2626">Firebase</text>
    </g>
    <g transform="translate(100, 82)">
      <rect width="70" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="35" y="16" text-anchor="middle" class="pill-text" fill="#BE185D">AWS</text>
    </g>
    <g transform="translate(180, 82)">
      <rect width="80" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="40" y="16" text-anchor="middle" class="pill-text" fill="#DB2777">Node.js</text>
    </g>
  </g>

  <!-- CARD 4: Web (X = 905) -->
  <g transform="translate(905, 10)">
    <rect width="275" height="140" rx="12" fill="#FFFFFF" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.01))"/>
    <rect width="275" height="140" rx="12" fill="none" stroke="#059669" stroke-width="1.2" class="card-border" style="animation-delay: 3s;"/>
    
    <!-- Title Section -->
    <rect x="15" y="15" width="4" height="16" rx="2" fill="url(#header-accent-4)"/>
    <text x="26" y="28" class="stack-title" fill="#374151">WEB DEVELOPMENT</text>
    
    <!-- Pills -->
    <!-- Row 1 -->
    <g transform="translate(15, 48)">
      <rect width="80" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="40" y="16" text-anchor="middle" class="pill-text" fill="#1D4ED8">React 19</text>
    </g>
    <g transform="translate(105, 48)">
      <rect width="70" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="35" y="16" text-anchor="middle" class="pill-text" fill="#111827">Next.js</text>
    </g>
    <g transform="translate(185, 48)">
      <rect width="75" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="37.5" y="16" text-anchor="middle" class="pill-text" fill="#0891B2">Tailwind</text>
    </g>
    
    <!-- Row 2 -->
    <g transform="translate(15, 82)">
      <rect width="90" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="45" y="16" text-anchor="middle" class="pill-text" fill="#1D4ED8">TypeScript</text>
    </g>
    <g transform="translate(115, 82)">
      <rect width="90" height="24" rx="12" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" filter="url(#pill-shadow)"/>
      <text x="45" y="16" text-anchor="middle" class="pill-text" fill="#4B5563">HTML5 &amp; CSS</text>
    </g>
  </g>
</svg>
